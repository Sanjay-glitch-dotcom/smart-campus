# ── App ──────────────────────────────────────────────
spring.application.name=smart_campus

# ── H2 Database ───────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/smartcampus
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ──────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Disable open-in-view to prevent lazy-loading queries during view rendering
spring.jpa.open-in-view=false

# ── H2 Console ────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ──────────────────────────────────────────────
jwt.secret=mysupersecretjwtkeythatshouldbeatleast32characterslong
jwt.expiration=86400000

# ── Gmail SMTP ───────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=thes21308@gmail.com
spring.mail.password=${EMAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Logging ───────────────────────────────────────────
logging.level.org.springframework.security=INFO

# ── Server ───────────────────────────────────────────
server.port=8082

# ── DevTools: disable LiveReload to prevent port 8081 conflict ───────────────
spring.devtools.livereload.enabled=false