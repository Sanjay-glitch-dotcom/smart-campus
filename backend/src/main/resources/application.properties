# ── App ──────────────────────────────────────────────
spring.application.name=smart_campus

# ── Database (Local Development) ─────────────────────
spring.datasource.url=jdbc:h2:file:./data/smartcampus
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Reset auto-increment on startup (for development)
spring.jpa.hibernate.ddl-auto=create-drop

# ── Database (Railway Production) ───────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/smartcampus}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# ── H2 Console ────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ──────────────────────────────────
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ──────────────────────────────────────────────
jwt.secret=mysupersecretjwtkeythatshouldbeatleast32characterslong
jwt.expiration=86400000

# ── Gmail SMTP ───────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=thes21308@gmail.com
spring.mail.password=${EMAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Logging ───────────────────────────────────────────
logging.level.org.springframework.security=INFO

# ── File Upload ───────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── File Upload Directory ───────────────────────────────
app.upload.dir=uploads

# ── DevTools ─────────────────────────────────────────
spring.devtools.livereload.enabled=false

server.port=${PORT:8082}