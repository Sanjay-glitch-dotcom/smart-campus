<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue - Smart Campus</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card mt-5">
                    <div class="card-header">
                        <h3>Report New Issue</h3>
                    </div>
                    <div class="card-body">
                        <form id="issueForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="title" class="form-label">Issue Title *</label>
                                    <input type="text" class="form-control" id="title" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="type" class="form-label">Issue Type *</label>
                                    <select class="form-select" id="type" required>
                                        <option value="">Select Type</option>
                                        <option value="WIFI">WiFi</option>
                                        <option value="CLASSROOM">Classroom</option>
                                        <option value="LAB">Lab</option>
                                        <option value="HOSTEL">Hostel</option>
                                        <option value="CAFETERIA">Cafeteria</option>
                                        <option value="LIBRARY">Library</option>
                                        <option value="SPORTS">Sports</option>
                                        <option value="ELECTRICITY">Electricity</option>
                                        <option value="PLUMBING">Plumbing</option>
                                        <option value="SECURITY">Security</option>
                                        <option value="OTHER">Other</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" rows="4" placeholder="Please describe the issue in detail..."></textarea>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="priority" class="form-label">Priority *</label>
                                    <select class="form-select" id="priority" required>
                                        <option value="">Select Priority</option>
                                        <option value="LOW">Low</option>
                                        <option value="MEDIUM">Medium</option>
                                        <option value="HIGH">High</option>
                                        <option value="URGENT">Urgent</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="location" class="form-label">Location</label>
                                    <input type="text" class="form-control" id="location" placeholder="e.g., Main Building">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="building" class="form-label">Building</label>
                                    <input type="text" class="form-control" id="building" placeholder="e.g., Engineering Block">
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="roomNumber" class="form-label">Room Number</label>
                                    <input type="text" class="form-control" id="roomNumber" placeholder="e.g., 301">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="attachment" class="form-label">Attachment (Optional)</label>
                                    <input type="file" class="form-control" id="attachment" accept="image/*,.pdf,.doc,.docx">
                                </div>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <a href="/dashboard" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">Submit Issue</button>
                            </div>
                        </form>
                        
                        <div id="error-message" class="alert alert-danger mt-3" style="display: none;"></div>
                        <div id="success-message" class="alert alert-success mt-3" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/issue-form.js"></script>
</body>
</html>
