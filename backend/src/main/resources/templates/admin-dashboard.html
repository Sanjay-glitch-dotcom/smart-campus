<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Smart Campus</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Smart Campus Admin</a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3" id="admin-info"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header">
                        <h5>Admin Menu</h5>
                    </div>
                    <div class="list-group list-group-flush">
                        <a href="#" class="list-group-item list-group-item-action active" onclick="showSection('dashboard')">
                            <i class="bi bi-speedometer2"></i> Dashboard
                        </a>
                        <a href="#" class="list-group-item list-group-item-action" onclick="showSection('issues')">
                            <i class="bi bi-list-task"></i> All Issues
                        </a>
                        <a href="#" class="list-group-item list-group-item-action" onclick="showSection('unassigned')">
                            <i class="bi bi-clipboard-x"></i> Unassigned Issues
                        </a>
                        <a href="#" class="list-group-item list-group-item-action" onclick="showSection('users')">
                            <i class="bi bi-people"></i> Users
                        </a>
                        <a href="#" class="list-group-item list-group-item-action" onclick="showSection('analytics')">
                            <i class="bi bi-graph-up"></i> Analytics
                        </a>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9">
                <!-- Dashboard Section -->
                <div id="dashboard-section" class="content-section">
                    <h2>Admin Dashboard</h2>
                    <div class="row" id="admin-stats">
                        <!-- Stats will be loaded here -->
                    </div>
                    <div class="row mt-4">
                        <div class="col-md-6">
                            <h4>Issue Statistics</h4>
                            <div id="issue-stats-chart">
                                <!-- Chart will be loaded here -->
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h4>Recent Issues</h4>
                            <div id="recent-issues-admin">
                                <!-- Recent issues will be loaded here -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- All Issues Section -->
                <div id="issues-section" class="content-section" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2>All Issues</h2>
                        <div>
                            <input type="text" class="form-control d-inline-block w-auto" id="search-issues" placeholder="Search issues...">
                            <button class="btn btn-primary ms-2" onclick="searchIssues()">Search</button>
                        </div>
                    </div>
                    <div id="all-issues-list">
                        <!-- All issues will be loaded here -->
                    </div>
                </div>

                <!-- Unassigned Issues Section -->
                <div id="unassigned-section" class="content-section" style="display: none;">
                    <h2>Unassigned Issues</h2>
                    <div id="unassigned-issues-list">
                        <!-- Unassigned issues will be loaded here -->
                    </div>
                </div>

                <!-- Users Section -->
                <div id="users-section" class="content-section" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2>User Management</h2>
                        <div>
                            <input type="text" class="form-control d-inline-block w-auto" id="search-users" placeholder="Search users...">
                            <button class="btn btn-primary ms-2" onclick="searchUsers()">Search</button>
                        </div>
                    </div>
                    <div id="users-list">
                        <!-- Users will be loaded here -->
                    </div>
                </div>

                <!-- Analytics Section -->
                <div id="analytics-section" class="content-section" style="display: none;">
                    <h2>Analytics</h2>
                    <div class="row">
                        <div class="col-md-6">
                            <h4>Issues by Type</h4>
                            <div id="type-chart">
                                <!-- Chart will be loaded here -->
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h4>Issues by Priority</h4>
                            <div id="priority-chart">
                                <!-- Chart will be loaded here -->
                            </div>
                        </div>
                    </div>
                    <div class="row mt-4">
                        <div class="col-12">
                            <h4>Resolution Trends</h4>
                            <div id="trends-chart">
                                <!-- Chart will be loaded here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Issue Assignment Modal -->
    <div class="modal fade" id="assignModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Assign Issue</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="assignTo" class="form-label">Assign To</label>
                        <select class="form-select" id="assignTo">
                            <!-- Staff will be loaded here -->
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="assignIssue()">Assign</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/admin-dashboard.js"></script>
</body>
</html>
